    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0E11; /* Dark Mode Background */
            color: #EAECEF; /* Light Text */
            margin: 0;
            overflow-y: auto !important; /* Force overflow for scrolling */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Institutional Grid Background - Dark Mode */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        /* Dark Mode Glass Effect */
        .glass {
            background: rgba(30, 35, 41, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        /* Global Scrollbar - Dark */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0E11;
        }
        ::-webkit-scrollbar-thumb {
            background: #2B3139;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #474D57;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Wallet Modal UI Fixes */
        .wallet-adapter-modal-wrapper {
            background: #181C25 !important;
            border: 1px solid #2B3139 !important;
            border-radius: 40px !important;
            font-family: 'Inter', sans-serif !important;
        }
        .wallet-adapter-modal-button-close {
            background: #2B3139 !important;
        }
        .wallet-adapter-modal-title {
            color: #EAECEF !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: -0.05em !important;
        }
        .wallet-adapter-modal-list .wallet-adapter-button {
            border-radius: 20px !important;
            background: #0B0E11 !important;
            border: 1px solid #2B3139 !important;
            margin-bottom: 8px !important;
        }
        .wallet-adapter-modal-list .wallet-adapter-button:hover {
            background: #1E2329 !important;
            border-color: #6366f1 !important;
        }
        
        /* Force the "Install" link to open in new tab and be visible */
        .wallet-adapter-modal-middle-button {
            background: #6366f1 !important;
            color: white !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            border-radius: 16px !important;
            margin-top: 10px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        /* Animations */
        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <!-- Automatic detection hack for redirects -->
    <script>
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.wallet-adapter-modal-middle-button');
            if (btn && btn.innerText.toLowerCase().includes('install')) {
                // The standard library uses internal state, but we can help it
                console.log('Redirecting to wallet download...');
            }
        });
    </script>
